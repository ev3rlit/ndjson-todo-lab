services:
  lb:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: todo-lb
    depends_on:
      - web1
      - web2
      - web3
    ports:
      - "${LB_PORT:-8080}:8080"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

  web1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-web-1
    hostname: todo-web-1
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      ADDR: ":8080"
      SERVER_NAME: web1
      CONTAINER_NAME: todo-web-1
      TODO_DATA_FILE: /workspace/data/todos.ndjson
    command:
      - /bin/sh
      - -c
      - mkdir -p /workspace/logs && ndjson-todo-lab 2>&1 | tee -a /workspace/logs/web1.ndjson
    volumes:
      - todo_data:/workspace/data
      - todo_logs:/workspace/logs
    restart: unless-stopped

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-web-2
    hostname: todo-web-2
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      ADDR: ":8080"
      SERVER_NAME: web2
      CONTAINER_NAME: todo-web-2
      TODO_DATA_FILE: /workspace/data/todos.ndjson
    command:
      - /bin/sh
      - -c
      - mkdir -p /workspace/logs && ndjson-todo-lab 2>&1 | tee -a /workspace/logs/web2.ndjson
    volumes:
      - todo_data:/workspace/data
      - todo_logs:/workspace/logs
    restart: unless-stopped

  web3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-web-3
    hostname: todo-web-3
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      ADDR: ":8080"
      SERVER_NAME: web3
      CONTAINER_NAME: todo-web-3
      TODO_DATA_FILE: /workspace/data/todos.ndjson
    command:
      - /bin/sh
      - -c
      - mkdir -p /workspace/logs && ndjson-todo-lab 2>&1 | tee -a /workspace/logs/web3.ndjson
    volumes:
      - todo_data:/workspace/data
      - todo_logs:/workspace/logs
    restart: unless-stopped

volumes:
  todo_data:
  todo_logs:
  nginx_logs:
